<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketWeb • The Ripple</title>
    <style>
        body { margin:0; padding:0; height:100vh; overflow:hidden; background:#0a0a0a; color:#e2e8f0; font-family:system-ui,sans-serif; }
        .flex { display:flex; }
        .sidebar { width:360px; background:#18181b; border-right:1px solid #27272a; flex-direction:column; }
        .header { padding:32px 24px 24px; border-bottom:1px solid #27272a; }
        .title { font-size:32px; font-weight:700; background:linear-gradient(to right,#10b981,#22d3ee); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .main { flex:1; position:relative; }
        .topbar { height:64px; background:#18181b; border-bottom:1px solid #27272a; padding:0 24px; align-items:center; justify-content:space-between; }
        #canvas { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:660px; height:660px; }
        .btn { padding:12px 28px; border-radius:12px; font-weight:600; cursor:pointer; transition:all 0.2s; }
        .btn-green { background:#10b981; color:white; }
        .btn-green:hover { background:#34d399; }
        .btn-gray { background:#27272a; color:#e2e8f0; }
        .btn-gray:hover { background:#3f3f46; }
        .panel { margin:24px; background:#18181b; border:1px solid #27272a; border-radius:16px; padding:24px; flex:1; overflow:auto; }
    </style>
</head>
<body>
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="sidebar flex">
            <div class="header">
                <div class="title">MarketWeb</div>
                <div style="color:#34d399;font-size:14px;">The Ripple Effect</div>
            </div>

            <div style="padding:24px;">
                <div style="color:#a1a1aa;font-size:13px;margin-bottom:8px;">FED RATE CHANGE (%)</div>
                <input type="range" id="pctSlider" min="-3" max="3" step="0.25" value="0" style="width:100%;accent-color:#10b981;">
                <div id="pctValue" style="margin-top:20px;font-family:monospace;font-size:52px;font-weight:700;text-align:center;">0.00%</div>
            </div>

            <div id="infoPanel" class="panel">
                <div style="color:#34d399;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">SELECTED VARIABLE</div>
                <h3 id="nodeTitle" style="font-size:24px;font-weight:600;margin:0 0 20px 0;">Click any circle</h3>
                <div style="background:#27272a;padding:20px;border-radius:12px;">
                    <div style="display:flex;justify-content:space-between;align-items:baseline;">
                        <span style="color:#a1a1aa;font-size:13px;">Projected value</span>
                        <div id="nodeProjected" style="font-family:monospace;font-size:42px;font-weight:700;">—</div>
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:16px;">
                        <span style="color:#a1a1aa;font-size:13px;">Deviation from base</span>
                        <div id="nodeDeviation" style="font-family:monospace;font-size:28px;font-weight:600;">—</div>
                    </div>
                    <div id="nodeBase" style="margin-top:20px;color:#71717a;font-size:13px;">Base case: —</div>
                </div>
                <p id="nodeDesc" style="margin-top:28px;color:#a1a1aa;line-height:1.5;"></p>
            </div>

            <div style="padding:24px;border-top:1px solid #27272a;">
                <button id="resetBtn" class="btn btn-gray w-full">Reset to Base</button>
            </div>
        </div>

        <!-- Center Area -->
        <div class="main">
            <div class="topbar">
                <div style="color:#34d399;">March 2026 FRED base values</div>
                <button id="glossaryBtn" class="btn btn-gray">Glossary</button>
            </div>
            <svg id="canvas" width="660" height="660"></svg>
        </div>
    </div>

    <!-- Glossary Modal -->
    <div id="glossaryModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);align-items:center;justify-content:center;z-index:1000;">
        <div style="background:#18181b;width:90%;max-width:860px;max-height:88vh;border-radius:20px;overflow:hidden;">
            <div style="padding:28px;border-bottom:1px solid #27272a;display:flex;justify-content:space-between;align-items:center;">
                <h2 style="margin:0;font-size:28px;">Simple Glossary</h2>
                <button id="closeGlossary" style="font-size:40px;color:#71717a;background:none;border:none;cursor:pointer;">×</button>
            </div>
            <div id="glossaryContent" style="padding:32px;overflow:auto;max-height:calc(88vh - 80px);"></div>
        </div>
    </div>

    <script>
        const nodes = [
            { id: 'fed', label: 'Fed Funds Rate', r: 55, x: 330, y: 330, color: '#10b981' },
            { id: 'treasury2', label: '2Y Treasury', r: 42, x: 180, y: 180, color: '#334155' },
            { id: 'prime', label: 'Prime Rate', r: 42, x: 480, y: 180, color: '#334155' },
            { id: 'mortgage30', label: '30Y Mortgage', r: 42, x: 120, y: 330, color: '#334155' },
            { id: 'auto_loan', label: 'Auto Loan', r: 42, x: 540, y: 330, color: '#334155' },
            { id: 'creditcard', label: 'Credit Card', r: 42, x: 180, y: 480, color: '#334155' },
            { id: 'inflation', label: 'Inflation', r: 38, x: 330, y: 120, color: '#334155' },
            { id: 'unemployment', label: 'Unemployment', r: 38, x: 330, y: 540, color: '#334155' },
            { id: 'housing', label: 'Housing Prices', r: 35, x: 80, y: 250, color: '#334155' },
            { id: 'sp500', label: 'S&P 500', r: 35, x: 580, y: 250, color: '#334155' },
            { id: 'gold', label: 'Gold', r: 35, x: 150, y: 420, color: '#334155' },
            { id: 'bitcoin', label: 'Bitcoin', r: 35, x: 510, y: 420, color: '#334155' }
        ];

        function createWeb() {
            const svg = document.getElementById('canvas');
            svg.innerHTML = '';

            // Concentric rings
            for (let i = 1; i <= 4; i++) {
                const ring = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                ring.setAttribute("cx", "330");
                ring.setAttribute("cy", "330");
                ring.setAttribute("r", 80 + i * 70);
                ring.setAttribute("fill", "none");
                ring.setAttribute("stroke", "#27272a");
                ring.setAttribute("stroke-width", "28");
                svg.appendChild(ring);
            }

            // Nodes
            nodes.forEach(node => {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", node.x);
                circle.setAttribute("cy", node.y);
                circle.setAttribute("r", node.r);
                circle.setAttribute("fill", node.color);
                circle.setAttribute("stroke", "#111113");
                circle.setAttribute("stroke-width", "6");
                circle.setAttribute("style", "cursor:pointer");
                circle.onclick = () => selectNode(node);
                svg.appendChild(circle);

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", node.x);
                text.setAttribute("y", node.y + 5);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("fill", "#fff");
                text.setAttribute("font-size", "13");
                text.setAttribute("font-weight", "600");
                text.textContent = node.label.length > 12 ? node.label.substring(0,10)+".." : node.label;
                svg.appendChild(text);
            });

            // Center Fed
            const fed = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            fed.setAttribute("cx", "330");
            fed.setAttribute("cy", "330");
            fed.setAttribute("r", "55");
            fed.setAttribute("fill", "#10b981");
            fed.setAttribute("stroke", "#34d399");
            fed.setAttribute("stroke-width", "18");
            svg.appendChild(fed);
        }

        function selectNode(node) {
            document.getElementById('nodeTitle').textContent = node.label;
            document.getElementById('nodeProjected').innerHTML = `<span style="color:#34d399">Base + impact</span>`;
            document.getElementById('nodeDeviation').innerHTML = `<span style="color:#22c55e">↓ or ↑</span>`;
            document.getElementById('nodeDesc').textContent = node.desc || "This metric is directly affected by Fed rate decisions.";
        }

        window.onload = function() {
            createWeb();

            document.getElementById('pctSlider').addEventListener('input', function() {
                document.getElementById('pctValue').textContent = (this.value >= 0 ? '+' : '') + this.value + '%';
            });

            document.getElementById('glossaryBtn').addEventListener('click', () => {
                alert("Glossary coming soon.\n\nThis tool shows how changes in the Fed rate ripple out to affect your mortgage, car payments, credit cards, and daily life.");
            });

            document.getElementById('resetBtn').addEventListener('click', () => {
                document.getElementById('pctSlider').value = 0;
                document.getElementById('pctValue').textContent = '0.00%';
            });
        };
    </script>
</body>
</html>
