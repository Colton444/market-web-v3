<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketWeb • The Ripple Effect</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background: #0a0a0a;
            color: #e2e8f0;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            height: 72px;
            background: #111113;
            border-bottom: 1px solid #27272a;
            display: flex;
            align-items: center;
            padding: 0 40px;
            justify-content: space-between;
        }
        .title {
            font-size: 31px;
            font-weight: 700;
            background: linear-gradient(to right, #10b981, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .main {
            flex: 1;
            display: flex;
        }
        .left {
            width: 360px;
            background: #18181b;
            padding: 40px 28px;
            border-right: 1px solid #27272a;
        }
        .center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .right {
            width: 360px;
            background: #18181b;
            padding: 40px 28px;
            border-left: 1px solid #27272a;
            overflow-y: auto;
        }
        #canvas {
            width: 660px;
            height: 660px;
        }
        .slider-label {
            color: #a1a1aa;
            font-size: 13.5px;
            margin-bottom: 10px;
        }
        #pctValue {
            font-size: 58px;
            font-weight: 700;
            font-family: monospace;
            text-align: center;
            margin: 16px 0 36px;
        }
        .btn {
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 16px;
        }
        .btn-green { background: #10b981; color: white; }
        .btn-green:hover { background: #34d399; }
        .btn-gray { background: #27272a; color: #e2e8f0; }
        .btn-gray:hover { background: #3f3f46; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="title">MarketWeb</div>
        <div style="color:#34d399;">How Fed Rate Changes Affect Your Life</div>
        <button id="glossaryBtn" class="btn btn-gray" style="width:auto;padding:10px 24px;">Glossary</button>
    </div>

    <div class="main">
        <!-- Left Sidebar -->
        <div class="left">
            <div class="slider-label">FED RATE CHANGE (%)</div>
            <input type="range" id="pctSlider" min="-3" max="3" step="0.25" value="0" style="width:100%; accent-color:#10b981;">
            <div id="pctValue">0.00%</div>
            
            <button id="resetBtn" class="btn btn-gray">Reset to Base Case</button>
        </div>

        <!-- Center Canvas -->
        <div class="center">
            <svg id="canvas" width="660" height="660"></svg>
        </div>

        <!-- Right Panel -->
        <div class="right" id="infoPanel">
            <div style="color:#34d399; font-size:13px; text-transform:uppercase; letter-spacing:1px;">SELECTED VARIABLE</div>
            <h3 id="nodeTitle" style="font-size:26px; margin:24px 0 28px 0;">Click any circle</h3>
            
            <div style="background:#27272a; padding:24px; border-radius:16px;">
                <div style="display:flex; justify-content:space-between; align-items:baseline;">
                    <span style="color:#a1a1aa;">Projected value</span>
                    <div id="nodeProjected" style="font-size:42px; font-weight:700; font-family:monospace;">—</div>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:baseline; margin-top:20px;">
                    <span style="color:#a1a1aa;">Change from today</span>
                    <div id="nodeDeviation" style="font-size:26px; font-weight:600; font-family:monospace;">—</div>
                </div>
            </div>

            <p id="nodeDesc" style="margin-top:32px; line-height:1.7; color:#a1a1aa; font-size:15px;"></p>
        </div>
    </div>

    <!-- Glossary Modal -->
    <div id="glossaryModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);align-items:center;justify-content:center;z-index:1000;">
        <div style="background:#18181b;width:90%;max-width:860px;max-height:88vh;border-radius:20px;overflow:hidden;">
            <div style="padding:28px;border-bottom:1px solid #27272a;display:flex;justify-content:space-between;align-items:center;">
                <h2 style="margin:0;font-size:28px;">Simple Glossary</h2>
                <button id="closeGlossary" style="font-size:40px;color:#71717a;background:none;border:none;cursor:pointer;">×</button>
            </div>
            <div id="glossaryContent" style="padding:32px;overflow:auto;max-height:calc(88vh-80px);"></div>
        </div>
    </div>

    <script>
        const nodes = [
            { id: 'fed', label: 'Fed Funds Rate', x: 330, y: 330, r: 62, color: '#10b981' },
            { id: 'mortgage30', label: '30Y Mortgage', x: 200, y: 200, r: 44, color: '#334155' },
            { id: 'auto_loan', label: 'Auto Loan', x: 460, y: 200, r: 44, color: '#334155' },
            { id: 'creditcard', label: 'Credit Card', x: 140, y: 330, r: 44, color: '#334155' },
            { id: 'inflation', label: 'Inflation', x: 520, y: 330, r: 44, color: '#334155' },
            { id: 'unemployment', label: 'Unemployment', x: 200, y: 460, r: 44, color: '#334155' },
            { id: 'housing', label: 'Housing Prices', x: 460, y: 460, r: 44, color: '#334155' },
            { id: 'sp500', label: 'S&P 500', x: 330, y: 140, r: 40, color: '#334155' },
            { id: 'gold', label: 'Gold', x: 330, y: 520, r: 40, color: '#334155' },
            { id: 'bitcoin', label: 'Bitcoin', x: 100, y: 250, r: 40, color: '#334155' }
        ];

        function createWeb() {
            const svg = document.getElementById('canvas');
            svg.innerHTML = '';

            // Concentric rings (soft and calm)
            for (let i = 1; i <= 4; i++) {
                const ring = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                ring.setAttribute("cx", "330");
                ring.setAttribute("cy", "330");
                ring.setAttribute("r", 95 + i * 72);
                ring.setAttribute("fill", "none");
                ring.setAttribute("stroke", "#27272a");
                ring.setAttribute("stroke-width", "32");
                svg.appendChild(ring);
            }

            // Nodes
            nodes.forEach(node => {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", node.x);
                circle.setAttribute("cy", node.y);
                circle.setAttribute("r", node.r);
                circle.setAttribute("fill", node.color);
                circle.setAttribute("stroke", "#111113");
                circle.setAttribute("stroke-width", "9");
                circle.style.cursor = "pointer";
                circle.onclick = () => selectNode(node);
                svg.appendChild(circle);

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", node.x);
                text.setAttribute("y", node.y + 6);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("fill", "#fff");
                text.setAttribute("font-size", "13");
                text.setAttribute("font-weight", "600");
                text.textContent = node.label.length > 13 ? node.label.substring(0,12) + ".." : node.label;
                svg.appendChild(text);
            });

            // Center Fed orb
            const fed = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            fed.setAttribute("cx", "330");
            fed.setAttribute("cy", "330");
            fed.setAttribute("r", "62");
            fed.setAttribute("fill", "#10b981");
            fed.setAttribute("stroke", "#34d399");
            fed.setAttribute("stroke-width", "24");
            svg.appendChild(fed);
        }

        function selectNode(node) {
            document.getElementById('nodeTitle').textContent = node.label;
            document.getElementById('nodeProjected').innerHTML = `<span style="color:#34d399">Projected impact</span>`;
            document.getElementById('nodeDeviation').innerHTML = `<span style="color:#22c55e">Change shown here</span>`;
            document.getElementById('nodeDesc').textContent = "This is how the Fed rate change affects " + node.label.toLowerCase() + ". Higher rates usually make borrowing more expensive.";
        }

        function showGlossary() {
            const content = document.getElementById('glossaryContent');
            content.innerHTML = `
                <div style="border-bottom:1px solid #27272a;padding-bottom:28px;margin-bottom:28px;">
                    <h4 style="margin:0 0 12px 0;color:#34d399;">Fed Funds Rate</h4>
                    <p style="color:#a1a1aa;line-height:1.6;">The main interest rate set by the Federal Reserve. It influences almost every other rate in the economy.</p>
                </div>
                <div style="border-bottom:1px solid #27272a;padding-bottom:28px;margin-bottom:28px;">
                    <h4 style="margin:0 0 12px 0;color:#34d399;">30Y Mortgage</h4>
                    <p style="color:#a1a1aa;line-height:1.6;">The rate you pay on a 30-year home loan. Higher Fed rates usually push this up, making homes more expensive to buy.</p>
                </div>
                <div style="border-bottom:1px solid #27272a;padding-bottom:28px;margin-bottom:28px;">
                    <h4 style="margin:0 0 12px 0;color:#34d399;">Auto Loan Rate</h4>
                    <p style="color:#a1a1aa;line-height:1.6;">The interest rate on car loans. Higher Fed rates make monthly car payments more expensive.</p>
                </div>
                <div style="border-bottom:1px solid #27272a;padding-bottom:28px;margin-bottom:28px;">
                    <h4 style="margin:0 0 12px 0;color:#34d399;">Credit Card Rate</h4>
                    <p style="color:#a1a1aa;line-height:1.6;">The interest you pay on credit card balances. This rate usually rises quickly when the Fed hikes rates.</p>
                </div>
                <!-- Add more in next iteration if you like -->
            `;
            document.getElementById('glossaryModal').style.display = 'flex';
        }

        function hideGlossary() {
            document.getElementById('glossaryModal').style.display = 'none';
        }

        window.onload = function() {
            createWeb();

            document.getElementById('pctSlider').addEventListener('input', function() {
                document.getElementById('pctValue').textContent = (this.value >= 0 ? '+' : '') + this.value + '%';
            });

            document.getElementById('glossaryBtn').addEventListener('click', showGlossary);
            document.getElementById('closeGlossary').addEventListener('click', hideGlossary);
            document.getElementById('resetBtn').addEventListener('click', () => {
                document.getElementById('pctSlider').value = 0;
                document.getElementById('pctValue').textContent = '0.00%';
            });
        };
    </script>
</body>
</html>
