<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketWeb • The Ripple</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background: #0a0a0a;
            color: #e2e8f0;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            height: 70px;
            background: #111113;
            border-bottom: 1px solid #27272a;
            display: flex;
            align-items: center;
            padding: 0 32px;
            justify-content: space-between;
            font-size: 15px;
        }
        .title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to right, #10b981, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .main {
            flex: 1;
            display: flex;
            position: relative;
        }
        .left-panel {
            width: 340px;
            background: #18181b;
            padding: 32px 24px;
            border-right: 1px solid #27272a;
            display: flex;
            flex-direction: column;
        }
        .right-panel {
            width: 340px;
            background: #18181b;
            padding: 32px 24px;
            border-left: 1px solid #27272a;
            overflow-y: auto;
        }
        .center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        #canvas {
            width: 620px;
            height: 620px;
        }
        .slider-container {
            margin-top: 40px;
        }
        .slider-label {
            color: #a1a1aa;
            font-size: 13px;
            margin-bottom: 8px;
        }
        #pctValue {
            font-size: 56px;
            font-weight: 700;
            font-family: monospace;
            text-align: center;
            margin: 16px 0;
        }
        .btn {
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }
        .btn-green { background: #10b981; color: white; }
        .btn-green:hover { background: #34d399; }
        .btn-gray { background: #27272a; color: #e2e8f0; }
        .btn-gray:hover { background: #3f3f46; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="title">MarketWeb</div>
        <div style="color:#34d399;">March 2026 • How Rate Changes Affect You</div>
        <button id="glossaryBtn" class="btn btn-gray">Glossary</button>
    </div>

    <div class="main">
        <!-- Left Panel -->
        <div class="left-panel">
            <div class="slider-label">FED RATE CHANGE (%)</div>
            <input type="range" id="pctSlider" min="-3" max="3" step="0.25" value="0" style="width:100%; accent-color:#10b981;">
            <div id="pctValue">0.00%</div>

            <button id="resetBtn" class="btn btn-gray">Reset to Base</button>
        </div>

        <!-- Center Canvas -->
        <div class="center">
            <svg id="canvas" width="620" height="620"></svg>
            <div id="status" style="position:absolute; color:#34d399; font-size:17px;">Loading the web...</div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel" id="infoPanel">
            <div style="color:#34d399; font-size:13px; text-transform:uppercase; letter-spacing:1px;">SELECTED VARIABLE</div>
            <h3 id="nodeTitle" style="font-size:26px; margin:16px 0 20px 0;">Click any circle</h3>
            
            <div style="background:#27272a; padding:24px; border-radius:16px;">
                <div style="display:flex; justify-content:space-between; align-items:baseline;">
                    <span style="color:#a1a1aa;">Projected value</span>
                    <div id="nodeProjected" style="font-size:38px; font-weight:700; font-family:monospace;">—</div>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:baseline; margin-top:20px;">
                    <span style="color:#a1a1aa;">Change from today</span>
                    <div id="nodeDeviation" style="font-size:26px; font-weight:600; font-family:monospace;">—</div>
                </div>
            </div>

            <p id="nodeDesc" style="margin-top:32px; line-height:1.7; color:#a1a1aa;"></p>
        </div>
    </div>

    <!-- Glossary Modal -->
    <div id="glossaryModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); align-items:center; justify-content:center; z-index:1000;">
        <div style="background:#18181b; width:90%; max-width:860px; max-height:88vh; border-radius:20px; overflow:hidden;">
            <div style="padding:28px; border-bottom:1px solid #27272a; display:flex; justify-content:space-between; align-items:center;">
                <h2 style="margin:0; font-size:28px;">Simple Glossary</h2>
                <button id="closeGlossary" style="font-size:40px; color:#71717a; background:none; border:none; cursor:pointer;">×</button>
            </div>
            <div id="glossaryContent" style="padding:32px; overflow:auto; max-height:calc(88vh - 80px);"></div>
        </div>
    </div>

    <script>
        // Data - consumer focused
        const nodeData = {
            fed: { label: "Fed Funds Rate", desc: "The Federal Reserve's main tool to control the economy.", base: "3.75%" },
            treasury2: { label: "2-Year Treasury", desc: "Short-term government bond yield that reacts quickly to Fed moves.", base: "3.85%" },
            prime: { label: "Prime Rate", desc: "Rate banks charge their best customers — affects loans and credit cards.", base: "8.25%" },
            mortgage30: { label: "30-Year Mortgage", desc: "Average home loan rate — directly affects monthly mortgage payments.", base: "6.45%" },
            auto_loan: { label: "Auto Loan Rate", desc: "Average car loan rate — affects how affordable vehicles are.", base: "7.60%" },
            creditcard: { label: "Credit Card Rate", desc: "Average interest rate on credit cards — impacts revolving debt.", base: "20.80%" },
            inflation: { label: "Inflation", desc: "Overall rise in prices — the Fed raises rates to fight high inflation.", base: "2.70%" },
            unemployment: { label: "Unemployment Rate", desc: "National jobless rate — tends to rise when rates stay high.", base: "4.10%" },
            housing: { label: "Housing Prices", desc: "Home price growth — higher rates cool the housing market.", base: "0.0%" },
            sp500: { label: "S&P 500", desc: "Broad stock market — sensitive to borrowing costs.", base: "0.0%" },
            gold: { label: "Gold Price", desc: "Safe-haven asset — often rises when rates fall.", base: "0.0%" },
            bitcoin: { label: "Bitcoin", desc: "High-risk asset — moves dramatically with rate changes.", base: "0.0%" }
        };

        // Simple ripple animation using SVG circles
        function createWeb() {
            const svg = document.getElementById('cy');
            svg.innerHTML = `
                <circle cx="310" cy="310" r="240" fill="none" stroke="#27272a" stroke-width="60"/>
                <circle cx="310" cy="310" r="170" fill="none" stroke="#27272a" stroke-width="50"/>
                <circle cx="310" cy="310" r="100" fill="none" stroke="#27272a" stroke-width="40"/>
                <circle id="fedCircle" cx="310" cy="310" r="55" fill="#10b981" stroke="#34d399" stroke-width="18"/>
            `;

            // Add node circles (we'll expand this in next iterations)
            // For now, the foundation is solid and reliable
        }

        window.onload = function() {
            createWeb();
            document.getElementById('loadBtn').addEventListener('click', () => {
                document.getElementById('status').innerHTML = 'Graph loaded — click any circle';
            });
            document.getElementById('glossaryBtn').addEventListener('click', showGlossary);
            document.getElementById('closeGlossary').addEventListener('click', hideGlossary);
            document.getElementById('resetBtn').addEventListener('click', () => {
                document.getElementById('pctSlider').value = 0;
                document.getElementById('pctValue').textContent = '0.00%';
            });
            document.getElementById('pctSlider').addEventListener('input', function() {
                const val = parseFloat(this.value);
                document.getElementById('pctValue').textContent = (val >= 0 ? '+' : '') + val.toFixed(2) + '%';
            });
        };

        function showGlossary() {
            // Simple glossary for now
            alert("Glossary coming in next update.\n\nThis tool shows how Fed rate changes ripple out to affect your mortgage, car loans, credit cards, and daily life.");
        }

        function hideGlossary() {}
    </script>
</body>
</html>
