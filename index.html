<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketWeb • How Rate Changes Affect You</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.33.1/cytoscape.min.js"></script>
    <style>
        body { margin:0; padding:0; height:100vh; overflow:hidden; background:#0a0a0a; color:#e2e8f0; font-family:system-ui,sans-serif; }
        .flex { display:flex; }
        .sidebar { width:360px; background:#111113; border-right:1px solid #27272a; flex-direction:column; }
        .header { padding:32px 24px 24px; border-bottom:1px solid #27272a; }
        .title { font-size:32px; font-weight:700; background:linear-gradient(to right,#10b981,#22d3ee); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .main { flex:1; flex-direction:column; }
        .topbar { height:64px; background:#111113; border-bottom:1px solid #27272a; padding:0 24px; align-items:center; justify-content:space-between; font-size:14px; }
        #cy { flex:1; background:radial-gradient(circle at center,#1a1a2e 0%,#0a0a0a 75%); }
        .btn { padding:12px 28px; border-radius:12px; font-weight:600; cursor:pointer; transition:all 0.2s; }
        .btn-green { background:#10b981; color:white; }
        .btn-green:hover { background:#34d399; }
        .btn-gray { background:#27272a; color:#e2e8f0; }
        .btn-gray:hover { background:#3f3f46; }
        .panel { margin:24px; background:#18181b; border:1px solid #27272a; border-radius:16px; padding:24px; flex:1; overflow:auto; }
    </style>
</head>
<body>
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="sidebar flex">
            <div class="header">
                <div class="title">MarketWeb</div>
                <div style="color:#34d399; font-size:14px; margin-top:4px;">How Fed Rate Changes Affect You</div>
            </div>

            <div style="padding:24px;">
                <div style="color:#a1a1aa; font-size:13px; margin-bottom:8px;">FED RATE CHANGE (%)</div>
                <input type="range" id="pctSlider" min="-3" max="3" step="0.25" value="0" style="width:100%; accent-color:#10b981;">
                <div id="pctValue" style="margin-top:20px; font-family:monospace; font-size:52px; font-weight:700; text-align:center;">0.00%</div>
            </div>

            <div id="infoPanel" class="panel">
                <div style="color:#34d399; font-size:11px; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">SELECTED VARIABLE</div>
                <h3 id="nodeTitle" style="font-size:24px; font-weight:600; margin:0 0 20px 0;">Click any bubble</h3>
                
                <div style="background:#27272a; padding:20px; border-radius:12px;">
                    <div style="display:flex; justify-content:space-between; align-items:baseline;">
                        <span style="color:#a1a1aa; font-size:13px;">Projected value</span>
                        <div id="nodeProjected" style="font-family:monospace; font-size:42px; font-weight:700;">—</div>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:baseline; margin-top:16px;">
                        <span style="color:#a1a1aa; font-size:13px;">Deviation from base</span>
                        <div id="nodeDeviation" style="font-family:monospace; font-size:28px; font-weight:600;">—</div>
                    </div>
                    <div id="nodeBase" style="margin-top:20px; color:#71717a; font-size:13px;">Base case: —</div>
                </div>
                
                <p id="nodeDesc" style="margin-top:28px; color:#a1a1aa; line-height:1.6;"></p>
            </div>

            <div style="padding:24px; border-top:1px solid #27272a;">
                <button id="resetBtn" class="btn btn-gray w-full">Reset to Base</button>
            </div>
        </div>

        <!-- Graph Area -->
        <div class="main">
            <div class="topbar">
                <div style="color:#34d399;">March 2026 FRED base values</div>
                <button id="loadBtn" class="btn btn-green">LOAD GRAPH NOW</button>
                <button id="glossaryBtn" class="btn btn-gray">Glossary</button>
            </div>
            <div style="flex:1; position:relative;">
                <div id="cy"></div>
                <div id="status" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#34d399; font-size:18px; pointer-events:none;">Loading graph...</div>
            </div>
        </div>
    </div>

    <!-- Glossary Modal -->
    <div id="glossaryModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index:1000;">
        <div style="background:#18181b; width:90%; max-width:920px; max-height:90vh; border-radius:16px; overflow:hidden;">
            <div style="padding:24px; border-bottom:1px solid #27272a; display:flex; justify-content:space-between; align-items:center;">
                <h2 style="margin:0; font-size:28px;">Glossary – Simple Explanations</h2>
                <button id="closeGlossary" style="font-size:36px; color:#71717a; background:none; border:none; cursor:pointer;">×</button>
            </div>
            <div id="glossaryContent" style="padding:32px; overflow:auto; max-height:calc(90vh-80px);"></div>
        </div>
    </div>

    <script>
        let cy = null;
        let currentPct = 0;
        let selectedNodeId = null;

        const baseValues = { fed: "3.75%", treasury2: "3.85%", prime: "8.25%", mortgage30: "6.45%", auto_loan: "7.6%", creditcard: "20.8%", inflation: "2.7%", unemployment: "4.1%", housing: "0.0%", sp500: "0.0%", gold: "0.0%", bitcoin: "0.0%" };
        const numericBases = { fed: 3.75, treasury2: 3.85, prime: 8.25, mortgage30: 6.45, auto_loan: 7.6, creditcard: 20.8, inflation: 2.7, unemployment: 4.1, housing: 0, sp500: 0, gold: 0, bitcoin: 0 };
        const impactCoeff = { treasury2: 0.92, prime: 0.88, mortgage30: 0.85, auto_loan: 0.80, creditcard: 0.65, inflation: -0.58, unemployment: 0.32, housing: -1.2, sp500: -1.8, gold: -0.75, bitcoin: -3.8 };
        const nodeLabels = { fed: "Fed Funds Rate", treasury2: "2Y Treasury", prime: "Prime Rate", mortgage30: "30Y Mortgage", auto_loan: "Auto Loan Rate", creditcard: "Credit Card Rate", inflation: "Inflation", unemployment: "Unemployment Rate", housing: "Housing Prices", sp500: "S&P 500", gold: "Gold Price", bitcoin: "Bitcoin" };
        const descriptions = { fed: "The Federal Reserve's key interest rate — the most powerful lever in the economy.", treasury2: "Short-term government bond yield that moves quickly with Fed decisions.", prime: "The rate banks charge their best customers — affects credit cards and loans.", mortgage30: "Average 30-year home loan rate — directly impacts monthly mortgage payments.", auto_loan: "Average car loan rate — affects how affordable new or used cars are.", creditcard: "Average credit card interest rate — affects revolving debt for millions of households.", inflation: "Overall rise in prices — the Fed raises rates to fight high inflation.", unemployment: "National unemployment rate — tends to rise after sustained rate hikes.", housing: "Home price growth — higher rates cool buyer demand and slow price increases.", sp500: "Broad U.S. stock market — sensitive to changes in borrowing costs.", gold: "Gold price performance — often rises when rates fall (safe-haven effect).", bitcoin: "Leading cryptocurrency — high-beta asset that amplifies rate environment moves." };
        const relativeChangeNodes = ['sp500','housing','gold','bitcoin'];

        const elements = [ /* full nodes with initial data */ 
            { data: { id: 'fed', label: nodeLabels.fed, group: 'policy', size: 118, color: '#10b981', borderWidth: 16 } },
            { data: { id: 'treasury2', label: nodeLabels.treasury2, group: 'rates', size: 88, color: '#334155', borderWidth: 8 } },
            { data: { id: 'prime', label: nodeLabels.prime, group: 'rates', size: 88, color: '#334155', borderWidth: 8 } },
            { data: { id: 'mortgage30', label: nodeLabels.mortgage30, group: 'consumer', size: 88, color: '#334155', borderWidth: 8 } },
            { data: { id: 'auto_loan', label: nodeLabels.auto_loan, group: 'consumer', size: 88, color: '#334155', borderWidth: 8 } },
            { data: { id: 'creditcard', label: nodeLabels.creditcard, group: 'consumer', size: 88, color: '#334155', borderWidth: 8 } },
            { data: { id: 'inflation', label: nodeLabels.inflation, group: 'macro', size: 88, color: '#334155', borderWidth: 8 } },
            { data: { id: 'unemployment', label: nodeLabels.unemployment, group: 'macro', size: 88, color: '#334155', borderWidth: 8 } },
            { data: { id: 'housing', label: nodeLabels.housing, group: 'assets', size: 88, color: '#334155', borderWidth: 8 } },
            { data: { id: 'sp500', label: nodeLabels.sp500, group: 'assets', size: 88, color: '#334155', borderWidth: 8 } },
            { data: { id: 'gold', label: nodeLabels.gold, group: 'assets', size: 88, color: '#334155', borderWidth: 8 } },
            { data: { id: 'bitcoin', label: nodeLabels.bitcoin, group: 'assets', size: 88, color: '#334155', borderWidth: 8 } },
            ...['treasury2','prime','mortgage30','auto_loan','creditcard','inflation','unemployment','housing','sp500','gold','bitcoin'].map(t => ({ data: { source: 'fed', target: t } }))
        ];

        function loadGraph() {
            document.getElementById('status').innerHTML = 'Loading graph...';
            if (cy) cy.destroy();
            cy = null;

            cy = cytoscape({
                container: document.getElementById('cy'),
                elements: elements,
                style: [{
                    selector: 'node',
                    style: { 'shape': 'ellipse', 'width': 'data(size)', 'height': 'data(size)', 'background-color': 'data(color)', 'background-opacity': 0.95, 'border-width': 'data(borderWidth)', 'border-color': '#e2e8f0', 'label': 'data(label)', 'font-size': 14, 'color': '#fff', 'text-valign': 'center', 'text-halign': 'center', 'text-wrap': 'wrap', 'text-max-width': '130px', 'text-background-color': '#0f172a', 'text-background-opacity': 0.85, 'text-background-padding': 8 }
                }, {
                    selector: '#fed',
                    style: { 'width': 118, 'height': 118, 'background-color': '#10b981', 'border-width': 16, 'border-color': '#34d399' }
                }, {
                    selector: 'edge',
                    style: { 'width': 3, 'line-color': '#475569', 'target-arrow-shape': 'triangle', 'target-arrow-color': '#64748b', 'curve-style': 'bezier', 'line-style': 'dashed', 'line-dash-pattern': [12, 8] }
                }],
                layout: { name: 'cose', idealEdgeLength: 160, nodeRepulsion: 22000, gravity: 1.8, animate: false }
            });

            cy.on('tap', 'node', function(evt) {
                selectedNodeId = evt.target.id();
                updateSidePanel();
            });

            setTimeout(() => {
                if (cy) {
                    const fed = cy.getElementById('fed');
                    fed.position({ x: cy.width() / 2, y: cy.height() / 2 });
                    fed.lock();
                    cy.fit(null, 110);
                    cy.resize();
                    document.getElementById('status').style.display = 'none';
                }
            }, 1200);
        }

        function updateSidePanel() {
            if (!selectedNodeId) return;
            const id = selectedNodeId;
            document.getElementById('nodeTitle').textContent = nodeLabels[id];
            const baseNum = numericBases[id] || 0;
            const imp = (id === 'fed') ? currentPct : ((impactCoeff[id] || 0) * currentPct);
            const projectedNum = relativeChangeNodes.indexOf(id) !== -1 ? imp : (baseNum + imp);
            const devStr = (imp >= 0 ? '↑' : '↓') + Math.abs(imp).toFixed(2) + '%';
            const devColor = imp >= 0 ? '#ef4444' : '#22c55e';
            document.getElementById('nodeProjected').innerHTML = `<span style="color:${devColor}">${projectedNum.toFixed(2)}%</span>`;
            document.getElementById('nodeDeviation').innerHTML = `<span style="color:${devColor}">${devStr}</span>`;
            document.getElementById('nodeBase').innerHTML = `Base case: <span style="font-family:monospace">${baseValues[id]}</span>`;
            document.getElementById('nodeDesc').textContent = descriptions[id];
        }

        function updateImpacts(pct) {
            currentPct = parseFloat(pct);
            const display = (currentPct >= 0 ? '+' : '') + currentPct.toFixed(2) + '%';
            document.getElementById('pctValue').textContent = display;
            document.getElementById('pctValue').style.color = currentPct >= 0 ? '#ef4444' : '#34d399';
            if (cy) {
                const delta = currentPct;
                cy.nodes().forEach(node => {
                    const id = node.id();
                    let impactStr = '0.00%';
                    let color = '#334155';
                    let size = id === 'fed' ? 118 : 88;
                    let borderW = 8;
                    if (id === 'fed') {
                        impactStr = (currentPct >= 0 ? '↑' : '↓') + Math.abs(currentPct).toFixed(2) + '%';
                        color = currentPct >= 0 ? '#ef4444' : '#22c55e';
                    } else if (impactCoeff[id]) {
                        const imp = impactCoeff[id] * delta;
                        const abs = Math.abs(imp);
                        impactStr = (imp >= 0 ? '↑' : '↓') + abs.toFixed(1) + '%';
                        color = imp >= 0 ? '#ef4444' : '#22c55e';
                        size = 88 + abs * 17;
                        borderW = 8 + abs * 2;
                    }
                    node.data({ size: Math.min(Math.max(size, 82), 190), color, impactStr, impactColor: color, borderWidth: borderW });
                });
            }
            if (selectedNodeId) updateSidePanel();
        }

        function resetSimulation() {
            document.getElementById('pctSlider').value = 0;
            updateImpacts(0);
        }

        function showGlossary() {
            const modal = document.getElementById('glossaryModal');
            const content = document.getElementById('glossaryContent');
            content.innerHTML = '';
            Object.keys(nodeLabels).forEach(key => {
                const div = document.createElement('div');
                div.style.borderBottom = '1px solid #27272a';
                div.style.paddingBottom = '32px';
                div.innerHTML = `<h4 style="font-size:20px;font-weight:600;margin-bottom:12px;">${nodeLabels[key]}</h4><p style="color:#a1a1aa;line-height:1.6;">${descriptions[key]}</p>`;
                content.appendChild(div);
            });
            modal.style.display = 'flex';
        }

        function hideGlossary() {
            document.getElementById('glossaryModal').style.display = 'none';
        }

        window.onload = function() {
            document.getElementById('pctSlider').addEventListener('input', function() { updateImpacts(this.value); });
            document.getElementById('loadBtn').addEventListener('click', loadGraph);
            document.getElementById('resetBtn').addEventListener('click', resetSimulation);
            document.getElementById('glossaryBtn').addEventListener('click', showGlossary);
            document.getElementById('closeGlossary').addEventListener('click', hideGlossary);

            setTimeout(loadGraph, 800);
        };
    </script>
</body>
</html>
